name: ACEest Fitness CI/CD Pipeline

on:
  push:
    branches:
      - '**' # Triggers on ALL branches to catch bugs early
  pull_request:
    branches:
      - main # Specifically protects the production branch

jobs:
  build-and-test:
    name: "Primary Quality Gate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Build & Lint (Syntax Check)
        run: python -m compileall . # Fulfills the Build & Lint benchmark [cite: 23]

      - name: Automated Testing (Pytest)
        run: pytest test_app.py # Fulfills the Automated Testing benchmark [cite: 25]

      - name: Docker Image Assembly
        if: github.ref == 'refs/heads/main' && success()
        run: docker build -t aceest-fitness:latest .