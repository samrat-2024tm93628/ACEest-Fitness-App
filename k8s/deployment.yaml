apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest
  namespace: aceest
  labels:
    app.kubernetes.io/name: aceest-fitness
    app.kubernetes.io/component: api
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0     # zero-downtime: never drop below desired replica count
  selector:
    matchLabels:
      app.kubernetes.io/name: aceest-fitness
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aceest-fitness
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: app
          image: aceest-fitness:latest
          imagePullPolicy: IfNotPresent     # for `minikube image load`; set to Always with a registry
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-config
            - secretRef:
                name: aceest-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          emptyDir: {}            # ephemeral; swap for a PVC if persistence is required
