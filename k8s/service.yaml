apiVersion: v1
kind: Service
metadata:
  name: aceest
  namespace: aceest
  labels:
    app.kubernetes.io/name: aceest-fitness
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aceest-fitness
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
---
# Optional NodePort variant for easy `minikube service` access during demo.
# Keep as a separate Service so production stays ClusterIP-only.
apiVersion: v1
kind: Service
metadata:
  name: aceest-nodeport
  namespace: aceest
  labels:
    app.kubernetes.io/name: aceest-fitness
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: aceest-fitness
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
