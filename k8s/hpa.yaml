apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aceest
  namespace: aceest
  labels:
    app.kubernetes.io/name: aceest-fitness
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aceest
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
