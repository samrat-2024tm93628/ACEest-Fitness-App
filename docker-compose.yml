services:
  app:
    build: .
    image: aceest-fitness:latest
    container_name: aceest-app
    ports:
      - "5000:5000"
    environment:
      DB_PATH: /data/aceest.db
      PORT: "5000"
    volumes:
      - aceest_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:5000/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  sonarqube:
    image: sonarqube:lts-community
    container_name: aceest-sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs

  sonar-db:
    image: postgres:15-alpine
    container_name: aceest-sonar-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  aceest_data:
  sonar_data:
  sonar_extensions:
  sonar_logs:
  sonar_pgdata:
